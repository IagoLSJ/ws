services:
  redis:
    image: redis:latest
    platform: linux/amd64
    container_name: multinegocio-redis
    command: redis-server --requirepass default
    environment:
      REDIS_USER: default
      REDIS_PASSWORD: default
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - multinegocio_network

  waha:
    image: devlikeapro/waha:latest
    platform: linux/amd64
    container_name: multinegocio-waha
    environment:
      WHATSAPP_HOOK_URL: http://localhost:5678/webhook/webhook
      WHATSAPP_DEFAULT_ENGINE: GOWS
      WHATSAPP_HOOK_EVENTS: message
      WAHA_API_KEY: ""
      WAHA_NO_API_KEY: true
      WAHA_DASHBOARD_NO_PASSWORD: true
      WHATSAPP_SWAGGER_NO_PASSWORD: true
    volumes:
      - waha_sessions:/app/.sessions
      - waha_media:/app/.media
    ports:
      - "3100:3000"
    depends_on:
      - redis
    networks:
      - multinegocio_network

  n8n:
    image: n8nio/n8n:latest
    platform: linux/amd64
    container_name: multinegocio-n8n
    environment:
      WEBHOOK_URL: http://localhost:5678
      N8N_HOST: localhost
      GENERIC_TIMEZONE: America/Sao_Paulo
      N8N_LOG_LEVEL: debug
      N8N_SECURE_COOKIE: false
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: true
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - multinegocio_network

volumes:
  waha_sessions:
  waha_media:
  n8n_data:
  redis_data:

networks:
  multinegocio_network:
    driver: bridge
